<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CARTO. — Jeux à Paris</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;overflow:hidden;font-family:system-ui,-apple-system,sans-serif;background:#111}
#root{width:100%;height:100vh;display:flex;flex-direction:column;background:#111}
#topbar{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#1a1a1a;border-bottom:1px solid #333;flex-shrink:0;box-shadow:0 2px 10px rgba(0,0,0,.3);z-index:100}
#logo{font-size:18px;font-weight:700;color:#fff;letter-spacing:-.5px}
#logo b{color:#e8401c}
#addbtn{height:36px;padding:0 14px;background:#e8401c;border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
#cnt{font-size:12px;color:#888;flex-shrink:0;white-space:nowrap}
#chips{display:flex;gap:6px;padding:8px 14px;background:#1a1a1a;border-bottom:1px solid #333;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
#chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1px solid #333;background:#252525;color:#aaa;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;font-family:inherit}
.chip.on{color:#fff;border-color:transparent}
.chip[data-f="all"].on{background:#e8401c}
.chip[data-f="fav"].on{background:#fbbf24;color:#000}
#body{display:flex;flex:1;overflow:hidden;position:relative}
#map{flex:1;z-index:0;background:#0f0f0f}
.geo-btn{width:34px;height:34px;background:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 1px 5px rgba(0,0,0,0.4);margin-bottom:10px}
.geo-btn svg{width:20px;height:20px;fill:#333}
#panel{position:absolute;top:0;right:0;bottom:0;width:0;overflow:hidden;background:#1a1a1a;color:#fff;border-left:1px solid #333;transition:all .3s cubic-bezier(0.4, 0, 0.2, 1);z-index:1000}
#panel.open{width:320px}
#pi{width:320px;padding:20px;height:100%;overflow-y:auto;box-sizing:border-box}
#px{float:right;background:#333;border:none;border-radius:50%;width:30px;height:30px;cursor:pointer;color:#fff;display:flex;align-items:center;justify-content:center}
#fav-toggle{float:left;background:none;border:none;font-size:24px;cursor:pointer;color:#555}
#fav-toggle.active{color:#fbbf24}
#pe{font-size:32px;margin:10px 0 6px;display:block;clear:both}
#pn{font-size:20px;font-weight:700;color:#fff;margin-bottom:4px}
#pa{font-size:13px;color:#aaa;margin-bottom:20px;line-height:1.4}
.sl{font-size:11px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
#pg{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}
.gb{font-size:12px;padding:4px 12px;border-radius:20px;background:#2a2a2a;color:#eee;border:1px solid #333}
#ph{border-radius:10px;border:1px solid #333;background:#222;overflow:hidden;margin-bottom:20px}
.hr{display:flex;justify-content:space-between;padding:8px 14px;border-bottom:1px solid #2a2a2a;font-size:13px}
.hr.td{background:#e8401c22;border-left:3px solid #e8401c}
#ps{display:flex;align-items:center;gap:8px;margin-bottom:24px;font-size:13px;font-weight:600}
#pit{display:block;text-align:center;padding:14px;background:#e8401c;color:#fff;border-radius:10px;font-size:14px;font-weight:700;text-decoration:none}
#mbk{display:none;position:absolute;inset:0;background:rgba(0,0,0,.8);z-index:2000;align-items:center;justify-content:center;padding:16px}
#mbk.open{display:flex}
#mdl{background:#1a1a1a;color:#fff;border:1px solid #333;border-radius:16px;padding:24px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto}
.fi{width:100%;padding:12px;background:#2a2a2a;border:1px solid #333;border-radius:10px;color:#fff;margin-bottom:12px;font-family:inherit}
.game-select{display:grid;grid-template-columns: 1fr 1fr; gap:8px; margin: 15px 0;}
.game-opt{padding:8px; border:1px solid #333; border-radius:8px; font-size:12px; cursor:pointer; background:#222; text-align:center}
.game-opt.selected{border-color:#e8401c; background:#e8401c22}
.mk{border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;border:2px solid #1a1a1a;box-shadow:0 3px 10px rgba(0,0,0,0.5)}
.mk.act{transform:rotate(-45deg) scale(1.3)!important;border-color:#fff}
.mk span{transform:rotate(45deg)}
@media(max-width:640px){
    #panel{top:auto;right:0;left:0;bottom:0;width:100%;height:0;border-left:none;border-top:1px solid #333;border-radius:20px 20px 0 0}
    #panel.open{width:100%;height:70vh}
    #pi{width:100%}
    .addtxt{display:none}
}
</style>
</head>
<body>
<div id="root">
  <div id="topbar">
    <div id="logo">CARTO<b>.</b></div>

    <button id="addbtn"><b>+</b> <span class="addtxt">Ajouter un lieu</span></button>

    <button class="chip" data-f="Karaoké">🎤 Karaoké</button>
    <button class="chip" data-f="Arcade">🕹️ Arcade</button>
  </div>
  <div id="body">
    <div id="map"></div>
    <div id="panel">
      <div id="pi">
        <button id="px">✕</button>
        <button id="fav-toggle">☆</button>
        <span id="pe"></span>
        <div id="pn"></div>
        <div id="pa"></div>
        <div class="sl">Jeux proposés</div>
        <div id="pg"></div>
        <div class="sl">Horaires</div>
        <div id="ph"></div>
        <div id="ps"></div>
        <a id="pit" target="_blank" rel="noopener">Itinéraire Google Maps</a>
      </div>
    </div>
    <div id="mbk">
      <div id="mdl">
        <div class="mt">➕ Nouveau lieu</div>
        <div class="sl">Recherche automatique</div>
        <input class="fi" id="fn-search" type="text" placeholder="Nom du lieu (ex: Club 8 & 9)">
        <button id="search-geo" style="width:100%; padding:12px; background:#e8401c; color:white; border:none; border-radius:8px; margin-bottom:15px; cursor:pointer; font-weight:600">🔍 Trouver l'adresse</button>
        <input class="fi" id="fa-res" type="text" placeholder="Adresse trouvée..." readonly style="opacity:0.7">
        <div class="sl">Quels jeux proposent-ils ?</div>
        <div class="game-select" id="game-picker"></div>
        <div class="mf">
          <button class="mbtn" id="mcancel" style="background:#333;color:#fff;border:none;border-radius:8px;cursor:pointer;flex:1;padding:12px">Annuler</button>
          <button class="mbtn" id="msave" style="background:#16a34a;color:#fff;border:none;border-radius:8px;cursor:pointer;flex:2;padding:12px">Enregistrer</button>
        </div>
      </div>
    </div>
  </div>
</div>

let FAVS = JSON.parse(localStorage.getItem('carto_favs')) || [];
const map=L.map('map',{center:[48.856,2.352],zoom:13,zoomControl:false});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

let filt='all', aiI=null, MKS=[];

function getStatus(ho) {
    const now = new Date();
    const day = DKEYS[(now.getDay() + 6) % 7];
    const line = ho.find(l => l.startsWith(day));
    if(!line || line.includes("Fermé")) return false;
    return true;
}

function mkIcon(p,i,act){
  const isOpen = getStatus(p.ho);
  const col = isOpen ? GC[p.games[0]]?.c || '#555' : '#444';
  const sz=act?36:28;
  return L.divIcon({className:'',html:`<div class="mk${act?' act':''}" style="width:${sz}px;height:${sz}px;background:${col};border:2px solid ${act?'#fff':'#1a1a1a'}"><span>${GC[p.games[0]]?.e || '🎮'}</span></div>`,iconSize:[sz,sz],iconAnchor:[sz/2,sz]});
}

function showPanel(i){
  const p=DATA[i]; aiI=i;
  const isFav = FAVS.includes(p.name);
  document.getElementById('fav-toggle').textContent = isFav ? '⭐' : '☆';
  document.getElementById('fav-toggle').className = isFav ? 'active' : '';
  document.getElementById('pe').textContent = GC[p.games[0]]?.e || '🎮';
  document.getElementById('pn').textContent = p.name;
  document.getElementById('pa').textContent = p.addr;
  document.getElementById('pg').innerHTML = p.games.map(g=>`<span class="gb">${g}</span>`).join('');
  document.getElementById('ph').innerHTML = p.ho.map(h=>{
    const isTd = h.startsWith(DKEYS[(new Date().getDay()+6)%7]);
    return `<div class="hr ${isTd?'td':''}"><span>${h.split(':')[0]}</span><b>${h.split(':')[1]}</b></div>`;
  }).join('');
  document.getElementById('panel').classList.add('open');
}

function render(){
  MKS.forEach(m=>{if(m)map.removeLayer(m)}); MKS=[];
  let n=0;
  DATA.forEach((p,i)=>{
    const isFav = FAVS.includes(p.name);
    const fm = (filt==='all') || (filt==='fav' && isFav) || (p.games.includes(filt));
    if(!fm) return;
    n++;
    const m=L.marker([p.lat,p.lng],{icon:mkIcon(p,i,aiI===i)});
    m.on('click',()=> { map.panTo([p.lat,p.lng]); showPanel(i); render(); });
    m.addTo(map); MKS.push(m);
  });
  document.getElementById('cnt').textContent=n+' lieux';
}

// Favoris
document.getElementById('fav-toggle').onclick = () => {
    const name = DATA[aiI].name;
    if(FAVS.includes(name)) FAVS = FAVS.filter(f => f !== name);
    else FAVS.push(name);
    localStorage.setItem('carto_favs', JSON.stringify(FAVS));
    showPanel(aiI); render();
};

// Géo
const geoControl = L.Control.extend({
    options: { position: 'bottomright' },
    onAdd: function() {
        var div = L.DomUtil.create('div', 'geo-btn');
        div.innerHTML = '<svg viewBox="0 0 24 24"><path d="M12,8A4,4 0 0,1 16,12A4,4 0 0,1 12,16A4,4 0 0,1 8,12A4,4 0 0,1 12,8M3.05,13H1V11H3.05C3.5,6.83 6.83,3.5 11,3.05V1H13V3.05C17.17,3.5 20.5,6.83 20.95,11H23V13H20.95C20.5,17.17 17.17,20.5 13,20.95V23H11V20.95C6.83,20.5 3.5,17.17 3.05,13Z" /></svg>';
        div.onclick = function() { map.locate({setView: true, maxZoom: 16}); };
        return div;
    }
});
map.addControl(new geoControl());
L.control.zoom({position:'bottomright'}).addTo(map);

// Picker ajout
const picker = document.getElementById('game-picker');
Object.keys(GC).forEach(g => {
    const div = document.createElement('div');
    div.className = 'game-opt';
    div.textContent = GC[g].e + ' ' + g;
    div.onclick = () => div.classList.toggle('selected');
    picker.appendChild(div);
});

// Recherche Réelle
document.getElementById('search-geo').onclick = async () => {
    const query = document.getElementById('fn-search').value;
    if(!query) return alert("Saisis un nom !");
    document.getElementById('search-geo').textContent = "⌛ Recherche...";
    try {
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}+Paris&limit=1`);
        const json = await res.json();
        if(json.length > 0) {
            document.getElementById('fa-res').value = json[0].display_name;
            document.getElementById('fa-res').dataset.lat = json[0].lat;
            document.getElementById('fa-res').dataset.lon = json[0].lon;
            document.getElementById('search-geo').textContent = "✅ Trouvé !";
        } else { alert("Lieu introuvable."); }
    } catch(e) { alert("Erreur."); }
    setTimeout(() => document.getElementById('search-geo').textContent = "🔍 Trouver l'adresse", 2000);
};

document.getElementById('msave').onclick = () => {
    const name = document.getElementById('fn-search').value;
    const addr = document.getElementById('fa-res').value;
    const lat = parseFloat(document.getElementById('fa-res').dataset.lat);
    const lng = parseFloat(document.getElementById('fa-res').dataset.lon);
    const games = Array.from(document.querySelectorAll('.game-opt.selected')).map(el => el.textContent.split(' ').slice(1).join(' '));
    if(name && addr && games.length > 0) {
        DATA.push({ name, addr, games, lat, lng, ho: DKEYS.map(d => `${d}: 14h – 02h`) });
        document.getElementById('mbk').classList.remove('open');
        render();
    }
};

document.querySelectorAll('.chip').forEach(b=>{
    b.onclick=()=>{
        document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
        b.classList.add('on'); filt=b.dataset.f; render();
    }
});

document.getElementById('addbtn').onclick=()=>document.getElementById('mbk').classList.add('open');
document.getElementById('mcancel').onclick=()=>document.getElementById('mbk').classList.remove('open');
document.getElementById('px').onclick=()=>document.getElementById('panel').classList.remove('open');

render();
</script>
