<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CARTO - Paris Jeux</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        :root {
            --color-border-tertiary: #e5e7eb;
            --color-border-secondary: #d1d5db;
            --color-background-primary: #ffffff;
            --color-background-secondary: #f9fafb;
            --color-text-primary: #111827;
            --color-text-secondary: #4b5563;
            --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: var(--font-sans); overflow: hidden; }

        #root { display: flex; flex-direction: column; height: 100vh; width: 100%; }

        #topbar {
            display: flex; align-items: center; gap: 12px; padding: 10px 15px;
            background: white; border-bottom: 1px solid var(--color-border-tertiary); z-index: 1000;
        }

        #logo { font-size: 18px; font-weight: bold; }
        #logo b { color: #e8401c; }
        
        #srch {
            flex: 1; height: 35px; padding: 0 15px; border-radius: 8px;
            border: 1px solid var(--color-border-secondary); background: var(--color-background-secondary);
        }

        #chips {
            display: flex; gap: 8px; padding: 10px 15px; background: white;
            border-bottom: 1px solid var(--color-border-tertiary); overflow-x: auto;
        }

        .chip {
            padding: 6px 15px; border-radius: 20px; border: 1px solid var(--color-border-secondary);
            background: white; font-size: 12px; cursor: pointer; white-space: nowrap;
        }

        .chip.on { background: #e8401c; color: white; border-color: #e8401c; }

        #container { display: flex; flex: 1; position: relative; }
        
        /* LA CARTE PREND TOUT L'ESPACE */
        #map { flex: 1; height: 100%; width: 100%; z-index: 1; }

        /* PANNEAU LATÉRAL */
        #panel {
            position: absolute; top: 0; right: 0; bottom: 0; width: 0;
            background: white; z-index: 2000; transition: width 0.3s;
            box-shadow: -2px 0 10px rgba(0,0,0,0.1); overflow: hidden;
        }
        #panel.open { width: 320px; }
        #panel-content { padding: 20px; width: 320px; box-sizing: border-box; }
        #close-btn { float: right; cursor: pointer; font-size: 20px; }
        
        .game-tag {
            display: inline-block; padding: 4px 10px; background: #f3f4f6;
            border-radius: 5px; font-size: 11px; margin: 2px;
        }
    </style>
</head>
<body>

<div id="root">
    <div id="topbar">
        <div id="logo">CARTO<b>.</b></div>
        <input id="srch" type="text" placeholder="Rechercher un bar, un jeu (billard, échecs...)" />
        <div id="cnt">Chargement...</div>
    </div>

    <div id="chips">
        <button class="chip on" data-f="all">🎮 Tous</button>
        <button class="chip" data-f="Jeux de société">🎲 Jeux</button>
        <button class="chip" data-f="Billard">🎱 Billard</button>
        <button class="chip" data-f="Fléchettes">🎯 Fléchettes</button>
        <button class="chip" data-f="Karaoké">🎤 Karaoké</button>
    </div>

    <div id="container">
        <div id="map"></div>
        <div id="panel">
            <div id="panel-content">
                <span id="close-btn">×</span>
                <h2 id="p-name">Nom du lieu</h2>
                <p id="p-addr" style="color: #666; font-size: 13px;"></p>
                <hr>
                <h4>Jeux disponibles :</h4>
                <div id="p-games"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // Initialisation de la carte sur Paris
    var map = L.map('map').setView([48.8566, 2.3522], 13);

    // Chargement des "tuiles" (le dessin de la carte avec rues et métros)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // Données d'exemple
    var venues = [
        { name: "Le Nid - Cocon Ludique", addr: "227 Rue Saint-Martin, 75003 Paris", lat: 48.8644, lng: 2.3531, games: ["Jeux de société"] },
        { name: "Shoot Again", addr: "9 Cité Debergue, 75012 Paris", lat: 48.8460, lng: 2.4043, games: ["Billard"] },
        { name: "Les Petites Flèches", addr: "49 Rue Jean-Pierre Timbaud, 75011 Paris", lat: 48.8669, lng: 2.3739, games: ["Fléchettes"] },
        { name: "BAM Karaoke Box", addr: "40 Av. de la République, 75011 Paris", lat: 48.8654, lng: 2.3731, games: ["Karaoké"] }
    ];

    var markers = [];

    function displayVenues(filter = 'all') {
        // Nettoyer les anciens marqueurs
        markers.forEach(m => map.removeLayer(m));
        markers = [];

        var count = 0;
        venues.forEach(v => {
            if (filter === 'all' || v.games.includes(filter)) {
                var m = L.marker([v.lat, v.lng]).addTo(map);
                m.on('click', () => {
                    document.getElementById('p-name').innerText = v.name;
                    document.getElementById('p-addr').innerText = v.addr;
                    document.getElementById('p-games').innerHTML = v.games.map(g => `<span class="game-tag">${g}</span>`).join('');
                    document.getElementById('panel').classList.add('open');
                });
                markers.push(m);
                count++;
            }
        });
        document.getElementById('cnt').innerText = count + " lieux trouvés";
    }

    // Gestion des filtres (chips)
    document.querySelectorAll('.chip').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.chip').forEach(b => b.classList.remove('on'));
            btn.classList.add('on');
            displayVenues(btn.getAttribute('data-f'));
        });
    });

    // Fermer le panneau
    document.getElementById('close-btn').addEventListener('click', () => {
        document.getElementById('panel').classList.remove('open');
    });

    // Lancement initial
    displayVenues();

    // Correction bug d'affichage Leaflet au chargement
    setTimeout(() => { map.invalidateSize(); }, 400);
</script>

</body>
</html>
