<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CARTO — Paris Gaming Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap');

:root {
  --noir: #0d0d0d; --blanc: #f5f2ed; --accent: #e8401c;
  --green: #2ecc71; --grey: #7f8c8d; --sidebar-width: 360px;
  --header-height: 70px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; font-family: 'DM Sans', sans-serif; background: var(--noir); color: var(--blanc); }
body { display: flex; flex-direction: column; }

/* HEADER */
.header {
  height: var(--header-height); background: var(--noir); padding: 0 20px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid rgba(255,255,255,0.1); z-index: 1000; flex-shrink: 0;
}
.logo { font-family: 'Syne'; font-size: 22px; font-weight: 800; }
.logo span { color: var(--accent); }
.header-count { font-size: 12px; color: rgba(255,255,255,0.4); margin-left: 15px; flex: 1; }
.header-count strong { color: var(--accent); }

.search-wrap { flex: 2; max-width: 400px; }
#global-search {
  width: 100%; padding: 10px 15px; background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
  color: #fff; outline: none; font-size: 14px;
}

/* APP BODY */
.app-body { display: flex; flex: 1; height: calc(100% - var(--header-height)); overflow: hidden; }

/* SIDEBAR */
.sidebar {
  width: var(--sidebar-width); height: 100%; background: #111;
  border-right: 1px solid rgba(255,255,255,0.1); display: flex;
  flex-direction: column; z-index: 900; flex-shrink: 0;
}

/* FILTRES */
.filters-container {
  padding: 15px; background: #151515; border-bottom: 1px solid rgba(255,255,255,0.05);
  display: flex; gap: 8px; overflow-x: auto; white-space: nowrap;
}
.filters-container::-webkit-scrollbar { display: none; }
.f-btn {
  padding: 6px 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
  background: transparent; color: rgba(255,255,255,0.5); font-size: 11px;
  font-weight: 600; cursor: pointer; transition: 0.2s;
}
.f-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

/* LISTING */
.places-list { overflow-y: auto; flex: 1; padding: 15px; scrollbar-width: thin; }
.place-item {
  padding: 18px; background: rgba(255,255,255,0.02); border-radius: 14px;
  margin-bottom: 12px; cursor: pointer; border: 1px solid transparent; transition: 0.2s;
}
.place-item:hover { background: rgba(255,255,255,0.04); }
.place-item.active { border-color: var(--accent); background: rgba(232, 64, 28, 0.05); }

.p-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
.tag { font-size: 10px; padding: 2px 8px; border-radius: 4px; background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.6); }

/* MAP */
#map { flex: 1; height: 100%; background: #1a1a1a; position: relative; }
.geoloc-btn {
  position: absolute; bottom: 30px; right: 20px; z-index: 1000;
  width: 50px; height: 50px; background: var(--accent); border: none; border-radius: 50%;
  color: white; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}

@media (max-width: 768px) {
  .app-body { flex-direction: column-reverse; }
  .sidebar { width: 100%; height: 45vh; }
  #map { height: 55vh; }
  .geoloc-btn { bottom: calc(45vh + 20px); }
}
</style>
</head>
<body>

<header class="header">
  <div class="logo">CARTO<span>.</span></div>
  <div class="header-count"><strong id="hdr-total">0</strong> lieux actifs</div>
  <div class="search-wrap">
    <input id="global-search" type="text" placeholder="Chercher un bar, un jeu..." oninput="renderApp()">
  </div>
</header>

<main class="app-body">
  <section class="sidebar">
    <div class="filters-container">
      <button class="f-btn active" onclick="setFilter('all', this)">🎮 Tous</button>
      <button class="f-btn" onclick="setFilter('Jeux de société', this)">🎲 Jeux</button>
      <button class="f-btn" onclick="setFilter('Billard', this)">🎱 Billard</button>
      <button class="f-btn" onclick="setFilter('Arcade', this)">🕹️ Arcade</button>
      <button class="f-btn" onclick="setFilter('Karaoké', this)">🎤 Karaoké</button>
      <button class="f-btn" onclick="setFilter('Fléchettes', this)">🎯 Fléchettes</button>
    </div>
    <div class="places-list" id="places-list"></div>
  </section>
  <section id="map">
    <button class="geoloc-btn" onclick="locateUser()">⌖</button>
  </section>
</main>

<script>
// BASE DE DONNÉES MISE À JOUR (LIEUX RÉELS ACTIFS)
const allPlaces = [
  {name:"The Player One", address:"224 Rue Saint-Denis, 75002", status:"actif", games:["Arcade","Rétrogaming","Jeux de société"], lat:48.8685, lng:2.3505},
  {name:"La Revanche", address:"38 Av. Daumesnil, 75012", status:"actif", games:["Jeux de société"], lat:48.8485, lng:2.3755},
  {name:"Le 3Bis", address:"41 Rue des Pirogues de Bercy, 75012", status:"actif", games:["Jeux de société","Karaoké","Arcade"], lat:48.8332, lng:2.3873},
  {name:"Les Petites Flèches", address:"49 Rue Jean-Pierre Timbaud, 75011", status:"actif", games:["Fléchettes"], lat:48.8669, lng:2.3739},
  {name:"Lucky Folks", address:"Bercy Village, 75012", status:"actif", games:["Jeux de société","Pétanque","Karaoké"], lat:48.8330, lng:2.3870},
  {name:"Gossima Ping Pong", address:"4 Rue Victor Gelez, 75011", status:"actif", games:["Ping-pong"], lat:48.8649, lng:2.3827},
  {name:"Reset Bar", address:"17 Rue du Cygne, 75001", status:"actif", games:["Arcade","Jeux Vidéo"], lat:48.8634, lng:2.3484},
  {name:"Billard Nation Shoot Again", address:"9 Cité Debergue, 75012", status:"actif", games:["Billard"], lat:48.8460, lng:2.4043},
  {name:"Seven Squares", address:"30 Av. Corentin Cariou, 75019", status:"actif", games:["Bowling","Arcade"], lat:48.8960, lng:2.3894},
  {name:"Blitz Society", address:"4 Rue du Sabot, 75006", status:"actif", games:["Échecs"], lat:48.8529, lng:2.3314},
  {name:"Extra Life Café", address:"9 Pass. des Patriarches, 75005", status:"actif", games:["Arcade","Jeux Vidéo"], lat:48.8411, lng:2.3501}
];

const map = L.map('map', { center: [48.8566, 2.3522], zoom: 13, zoomControl: false });
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

let markers = [];
let currentFilter = 'all';

function setFilter(filter, btn) {
  document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = filter;
  renderApp();
}

function renderApp() {
  const query = document.getElementById('global-search').value.toLowerCase();
  const list = document.getElementById('places-list');
  list.innerHTML = '';
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  const filtered = allPlaces.filter(p => {
    const matchesQuery = p.name.toLowerCase().includes(query);
    const matchesFilter = currentFilter === 'all' || p.games.includes(currentFilter);
    return matchesQuery && matchesFilter;
  });

  filtered.forEach((p, i) => {
    const m = L.marker([p.lat, p.lng], {
      icon: L.divIcon({ className: '', html: `<div style="background:#e8401c; width:14px; height:14px; border-radius:50%; border:2px solid #fff;"></div>` })
    }).addTo(map);
    m.bindPopup(`<strong>${p.name}</strong><br>${p.games.join(', ')}`);
    markers.push(m);

    list.innerHTML += `
      <div class="place-item" onclick="focusPlace(${i}, ${p.lat}, ${p.lng})">
        <h4>${p.name}</h4>
        <div class="p-addr">📍 ${p.address}</div>
        <div class="p-tags">${p.games.map(g => `<span class="tag">${g}</span>`).join('')}</div>
      </div>`;
  });
  document.getElementById('hdr-total').innerText = filtered.length;
}

function focusPlace(i, lat, lng) {
  map.setView([lat, lng], 16);
  markers[i].openPopup();
}

function locateUser() { map.locate({setView: true, maxZoom: 15}); }

renderApp();
setTimeout(() => map.invalidateSize(), 300);
</script>
</body>
</html>
