<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CARTO — Live Status Paris</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap');

:root {
  --noir: #0d0d0d; --blanc: #f5f2ed; --accent: #e8401c;
  --green: #2ecc71; --grey: #7f8c8d; --sidebar: 340px;
}

*{margin:0;padding:0;box-sizing:border-box}
body{ font-family:'DM Sans',sans-serif; background:var(--noir); color:var(--blanc); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

/* HEADER */
.header{ background:var(--noir); padding:15px 20px; display:flex; align-items:center; gap:20px; border-bottom:1px solid rgba(255,255,255,0.1); z-index:1000; }
.logo{ font-family:'Syne'; font-size:22px; font-weight:800; }
.logo span{ color:var(--accent); }
.search-wrap{ flex:1; max-width:450px; }
#global-search{ width:100%; padding:10px 15px; background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.1); border-radius:8px; color:#fff; outline:none; }

/* APP BODY */
.app-body{ display:flex; flex:1; overflow:hidden; }
.sidebar{ width:var(--sidebar); background:#111; border-right:1px solid rgba(255,255,255,0.1); display:flex; flex-direction:column; }

/* LISTING */
.places-list{ overflow-y:auto; flex:1; }
.place-item{ padding:15px; border-bottom:1px solid rgba(255,255,255,0.05); cursor:pointer; transition:0.2s; position:relative; }
.place-item:hover{ background:rgba(255,255,255,0.03); }
.place-item.inactive { opacity: 0.5; filter: grayscale(1); }

.status-badge {
  display: inline-flex; align-items: center; gap: 5px; font-size: 9px; font-weight: 700; text-transform: uppercase;
  padding: 2px 8px; border-radius: 10px; margin-bottom: 8px;
}
.status-actif { background: rgba(46, 204, 113, 0.2); color: var(--green); }
.status-inactif { background: rgba(127, 140, 141, 0.2); color: var(--grey); }
.dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

.place-item h4{ font-family:'Syne'; font-size:15px; margin-bottom:4px; }
.place-item .p-addr{ font-size:12px; color:rgba(255,255,255,0.4); }

/* MAP */
#map{ flex:1; background:#1a1a1a; position: relative; }
.leaflet-popup-content-wrapper { background: #1a1a1a!important; color: #fff!important; border-radius: 12px!important; }

/* GEOLOC */
.geoloc-btn {
  position: absolute; bottom: 30px; right: 20px; z-index: 1000;
  width: 45px; height: 45px; background: var(--accent); border: none; border-radius: 50%;
  color: white; cursor: pointer; font-size: 22px; box-shadow: 0 4px 15px rgba(232,64,28,0.4);
  display: flex; align-items: center; justify-content: center;
}

@media(max-width:750px){ .app-body{flex-direction:column-reverse} .sidebar{width:100%; height:45vh;} }
</style>
</head>
<body>

<div class="header">
  <div class="logo">CARTO<span>.</span></div>
  <div class="search-wrap">
    <input id="global-search" type="text" placeholder="Rechercher un lieu actif..." oninput="renderApp()">
  </div>
</div>

<div class="app-body">
  <div class="sidebar">
    <div class="places-list" id="places-list"></div>
  </div>
  <div id="map">
    <button class="geoloc-btn" onclick="locateUser()">⌖</button>
  </div>
</div>

<script>
// BASE DE DONNÉES NETTOYÉE ET VÉRIFIÉE
const allPlaces = [
  {name:"The Player One", address:"224 Rue Saint-Denis, 75002", status:"actif", games:["Arcade","Rétrogaming"], lat:48.8685, lng:2.3505},
  {name:"La Revanche", address:"38 Av. Daumesnil, 75012", status:"actif", games:["Jeux de société"], lat:48.8485, lng:2.3755},
  {name:"Le 3Bis", address:"41 Rue des Pirogues de Bercy, 75012", status:"actif", games:["Jeux de société","Karaoké"], lat:48.8332, lng:2.3873},
  {name:"Les Petites Flèches", address:"49 Rue Jean-Pierre Timbaud, 75011", status:"actif", games:["Fléchettes"], lat:48.8669, lng:2.3739},
  {name:"Lucky Folks", address:"Bercy Village, 75012", status:"actif", games:["Jeux de société","Pétanque"], lat:48.8330, lng:2.3870},
  {name:"Gossima Ping Pong", address:"4 Rue Victor Gelez, 75011", status:"actif", games:["Ping-pong"], lat:48.8649, lng:2.3827},
  {name:"Le Nid (Fermé)", address:"227 Rue Saint-Martin, 75003", status:"inactif", games:["Jeux de société"], lat:48.8644, lng:2.3531},
  {name:"Reset Bar", address:"17 Rue du Cygne, 75001", status:"actif", games:["Arcade"], lat:48.8634, lng:2.3484}
];

const map = L.map('map', { center: [48.8566, 2.3522], zoom: 13, zoomControl: false });
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { 
  attribution: '&copy; <a href="https://carto.com/">CARTO</a>' 
}).addTo(map);

let markers = [];

function renderApp() {
  const q = document.getElementById('global-search').value.toLowerCase();
  const list = document.getElementById('places-list');
  list.innerHTML = '';
  
  // Supprimer les anciens marqueurs
  markers.forEach(m => map.removeLayer(m));
  markers = [];

  allPlaces.forEach((p, i) => {
    if(!p.name.toLowerCase().includes(q)) return;

    // Configuration du Marqueur
    const color = p.status === 'actif' ? '#e8401c' : '#7f8c8d';
    const m = L.marker([p.lat, p.lng], {
      icon: L.divIcon({
        className: '',
        html: `<div style="background:${color}; width:12px; height:12px; border-radius:50%; border:2px solid #fff; opacity:${p.status === 'actif' ? 1 : 0.5}; box-shadow: 0 0 5px rgba(0,0,0,0.5);"></div>`
      })
    }).addTo(map);
    
    m.bindPopup(`<b>${p.name}</b><br>${p.status === 'actif' ? '✅ Ouvert' : '❌ Fermé'}`);
    markers.push(m);

    // Ajout à la Liste latérale
    list.innerHTML += `
      <div class="place-item ${p.status === 'inactif' ? 'inactive' : ''}" onclick="focusPlace(${i})">
        <div class="status-badge ${p.status === 'actif' ? 'status-actif' : 'status-inactif'}">
          <div class="dot"></div>${p.status}
        </div>
        <h4>${p.name}</h4>
        <div class="p-addr">${p.address}</div>
      </div>`;
  });
}

function focusPlace(i) {
  const p = allPlaces[i];
  map.setView([p.lat, p.lng], 16);
  markers[i].openPopup();
}

function locateUser() {
  map.locate({setView: true, maxZoom: 15});
}

map.on('locationfound', (e) => {
  L.circle(e.latlng, {radius: 100, color: '#e8401c', fillOpacity: 0.1}).addTo(map);
  L.marker(e.latlng, {
    icon: L.divIcon({
        className: '',
        html: `<div style="background:#2563eb; width:12px; height:12px; border-radius:50%; border:2px solid #fff;"></div>`
    })
  }).addTo(map).bindPopup("Vous êtes ici").openPopup();
});

// Initialisation
renderApp();
setTimeout(() => map.invalidateSize(), 500);

</script>
</body>
</html>
