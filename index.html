#root{width:100%;height:100vh;display:flex;flex-direction:column;background:#fff}

.chip{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1px solid #e0e0e0;background:#fff;color:#666;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .15s;font-family:inherit;user-select:none}

.chip.on{color:#fff;border-color:transparent;font-weight:600}

.chip[data-f="Ping-pong"].on{background:#7c3aed}
.chip[data-f="Karaoké"].on{background:#db2777}
.chip[data-f="Bowling"].on{background:#0891b2}
.chip[data-f="Arcade"].on{background:#4f46e5}
.chip[data-f="Échecs"].on{background:#6b7280}
.chip[data-f="Pétanque"].on{background:#65a30d}

#map{flex:1;z-index:0}

#panel{position:absolute;top:0;right:0;bottom:0;width:0;overflow:hidden;background:#fff;border-left:1px solid #e5e5e5;transition:width .26s ease;z-index:10;box-shadow:-2px 0 12px rgba(0,0,0,.07)}

#px{float:right;background:#f5f5f5;border:1px solid #e0e0e0;border-radius:50%;width:26px;height:26px;font-size:12px;cursor:pointer;color:#888;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}

#pa{font-size:12px;color:#888;margin-bottom:14px;line-height:1.5}

#pg{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:14px}
.gb{font-size:11px;padding:3px 9px;border-radius:20px;background:#f5f5f5;color:#444;border:1px solid #e5e5e5}

#ps{display:flex;align-items:center;gap:6px;margin-bottom:14px;font-size:12px;font-weight:600}

#pit{display:block;text-align:center;padding:10px 16px;background:#e8401c;color:#fff;border-radius:8px;font-size:13px;font-weight:600;text-decoration:none;transition:background .15s;font-family:inherit}

#mbk{display:none;position:absolute;inset:0;background:rgba(0,0,0,.4);z-index:50;align-items:center;justify-content:center;padding:16px}

#mdl{background:#fff;border:1px solid #e5e5e5;border-radius:14px;padding:22px;width:100%;max-width:400px;max-height:90%;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.15)}

#mdl::-webkit-scrollbar-thumb{background:#e0e0e0;border-radius:4px}
.mt{font-size:16px;font-weight:600;color:#111;margin-bottom:14px}
.fl{display:block;font-size:11px;font-weight:600;color:#888;margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}

.gg{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:14px}

.mf{display:flex;gap:8px;margin-top:4px}

  var map2={'Jeux de société':{op:17,cl:0},'Karaoké':{op:14,cl:2},'Bowling':{op:10,cl:2},'Arcade':{op:11,cl:2},'Billard':{op:14,cl:2},'Fléchettes':{op:17,cl:2},'Baby-foot':{op:9,cl:2},'Pétanque':{op:9,cl:0}};
  for(var k in map2){if(sel.indexOf(k)>-1){dflt=map2[k];break;}}
  var t=dflt.op+'h – '+dflt.cl+'h';
  var ho=DKEYS.map(function(d){return d+': '+(d==='Dim'?'Fermé':t);});
  fetchedH={ho:ho,op:dflt.op,cl:dflt.cl};
  setTimeout(function(){
    document.getElementById('fst').innerHTML='✅ Horaires suggérés — <a href="https://www.google.com/maps/search/'+encodeURIComponent(name+' '+addr)+'" target="_blank" rel="noopener" style="color:#e8401c">vérifier sur Google Maps ↗</a>';
    var el=document.getElementById('hrs-out');el.style.display='block';
    el.innerHTML=ho.map(function(h){var s=h.split(': ');return'<div class="ho"><span>'+s[0]+'</span><span>'+(s[1]||'')+'</span></div>';}).join('');
  },700);
});
document.getElementById('msave').addEventListener('click',function(){
  var name=document.getElementById('fn').value.trim(),addr=document.getElementById('fa').value.trim();
  if(!name||!addr){alert('Le nom et l\'adresse sont obligatoires.');return;}
  var sel=Object.keys(chkG).filter(function(k){return chkG[k];});
  if(!sel.length){alert('Sélectionne au moins un jeu.');return;}
  var btn=this;btn.textContent='⏳';btn.disabled=true;
  fetch('https://nominatim.openstreetmap.org/search?format=json&q='+encodeURIComponent(addr)+'&limit=1',{headers:{'Accept-Language':'fr'}})
    .then(function(r){return r.json();})
    .then(function(d){
      var lat=48.856+(Math.random()-.5)*.01,lng=2.352+(Math.random()-.5)*.01;
      if(d&&d[0]){lat=parseFloat(d[0].lat);lng=parseFloat(d[0].lon);}
      var p={name:name,addr:addr,games:sel,lat:lat,lng:lng,op:fetchedH?fetchedH.op:17,cl:fetchedH?fetchedH.cl:1,ho:fetchedH?fetchedH.ho:DKEYS.map(function(dk){return dk+': '+(dk==='Dim'?'Fermé':'17h – 1h');})};
      DATA.push(p);document.getElementById('mbk').classList.remove('open');render();
      setTimeout(function(){map.setView([lat,lng],16,{animate:true});pick(DATA.length-1);},300);
    })
    .catch(function(){
      var p={name:name,addr:addr,games:sel,lat:48.856+(Math.random()-.5)*.02,lng:2.352+(Math.random()-.5)*.02,op:fetchedH?fetchedH.op:17,cl:fetchedH?fetchedH.cl:1,ho:fetchedH?fetchedH.ho:DKEYS.map(function(dk){return dk+': '+(dk==='Dim'?'Fermé':'17h – 1h');})};
      DATA.push(p);document.getElementById('mbk').classList.remove('open');render();
    })
    .finally(function(){btn.textContent='Ajouter le lieu';btn.disabled=false;});
});
render();
setTimeout(function(){map.invalidateSize();},150);
</script>
